name: Build PICO-8 J2ME

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openjdk:8
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install WTK dependencies
      run: |
        apt-get update
        apt-get install -y wget unzip
        
        # Попытка загрузить из архивов
        cd /tmp
        wget -q https://archive.org/download/wtk25_201611/WTK25.zip -O wtk.zip || true
        
        if [ -f wtk.zip ]; then
          unzip -q wtk.zip
          export CP=$(find . -name "midpapi.zip" -o -name "cldcapi.zip")
        fi
    
    - name: Compile
      run: |
        cd src
        javac *.java 2>&1 || echo "Compile failed without J2ME libs"
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class 2>/dev/null || true
