name: Build PICO-8 J2ME

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Compile
      run: |
        cd src
        javac -cp ../j2me-lib/midpapi21.jar:../j2me-lib/mmapi.jar -source 1.3 -target 1.3 *.java
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class
    
    - uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator
        path: src/dist/Pico8Emulator.jar
