name: Build PICO-8 J2ME

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Download J2ME libraries
      run: |
        mkdir -p /tmp/j2me-lib
        cd /tmp/j2me-lib
        
        # Загружаем midpapi.zip из Maven Central (если доступен)
        wget -q https://repo.maven.apache.org/maven2/com/sun/midp/midp-core/2.0/midp-core-2.0.jar -O midpapi.jar || true
        
        # Альтернатива: используем готовые библиотеки
        # Создаём mock библиотеки если ничего не загрузилось
        if [ ! -f midpapi.jar ]; then
          echo "Creating minimal J2ME stubs..."
          mkdir -p stubs
          cd stubs
          
          # Создаём нужные классы
          cat > MIDlet.java << 'STUB'
package javax.microedition.midlet;
public class MIDlet {
  public void startApp() {}
  public void pauseApp() {}
  public void destroyApp(boolean unconditional) {}
}
STUB

          cat > Display.java << 'STUB'
package javax.microedition.lcdui;
public class Display {
  public static Display getDisplay(javax.microedition.midlet.MIDlet m) { return new Display(); }
  public void setCurrent(Displayable d) {}
}
STUB

          cat > Canvas.java << 'STUB'
package javax.microedition.lcdui;
public class Canvas extends Displayable implements Runnable {
  protected void paint(Graphics g) {}
  protected void keyPressed(int keyCode) {}
  public int getWidth() { return 128; }
  public int getHeight() { return 128; }
  public void run() {}
}
STUB

          cat > Graphics.java << 'STUB'
package javax.microedition.lcdui;
public class Graphics {
  public static final int TOP = 0;
  public static final int LEFT = 0;
  public void setColor(int r, int g, int b) {}
  public void fillRect(int x, int y, int w, int h) {}
  public void drawString(String s, int x, int y, int a) {}
  public void drawImage(Image i, int x, int y, int a) {}
}
STUB

          cat > Image.java << 'STUB'
package javax.microedition.lcdui;
public class Image {
  public static Image createRGBImage(int[] rgb, int w, int h, boolean a) { return new Image(); }
}
STUB

          cat > Displayable.java << 'STUB'
package javax.microedition.lcdui;
public abstract class Displayable {}
STUB

          javac *.java
          jar cf ../j2me-stubs.jar javax/
          cd ..
        fi
    
    - name: Compile with J2ME
      run: |
        cd src
        export CP="/tmp/j2me-lib/j2me-stubs.jar:/tmp/j2me-lib/midpapi.jar"
        javac -cp $CP -source 1.3 -target 1.3 *.java 2>&1 || javac *.java
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator
        path: src/dist/Pico8Emulator.jar

    - name: Upload JAD
      uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator-JAD
        path: src/dist/Pico8Emulator.jad
