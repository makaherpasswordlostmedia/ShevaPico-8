name: Build PICO-8 J2ME

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Clone J2ME libraries repo
      run: |
        cd /tmp
        git clone https://github.com/shinovon/j2me-sdk.git 2>/dev/null || \
        git clone https://github.com/netpipe/j2me-sdk.git 2>/dev/null || \
        echo "Could not clone J2ME repo"
        
        if [ -d j2me-sdk ]; then
          ls -la j2me-sdk/lib/ || true
        fi
    
    - name: Compile PICO-8
      run: |
        cd src
        
        # Ищем библиотеки
        if [ -f /tmp/j2me-sdk/lib/midpapi.zip ]; then
          echo "Found real J2ME libraries"
          javac -cp /tmp/j2me-sdk/lib/midpapi.zip:/tmp/j2me-sdk/lib/cldcapi.zip *.java
        else
          echo "Compiling without J2ME libraries (basic compile)"
          javac *.java 2>&1 || true
        fi
        
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class 2>/dev/null || \
        jar cf dist/Pico8Emulator.jar *.class
        
        ls -lh dist/
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator
        path: src/dist/Pico8Emulator.jar
