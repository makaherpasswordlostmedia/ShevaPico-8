name: Build PICO-8 J2ME with WTK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Download WTK
      run: |
        # Загрузи WTK (если есть зеркало)
        # Или используй готовые J2ME библиотеки
        mkdir -p /tmp/j2me-libs
        
        # Альтернатива: используй midpapi.zip из архива
        # curl -o /tmp/midpapi.zip "URL_К_ФАЙЛУ"
        # unzip /tmp/midpapi.zip -d /tmp/j2me-libs
    
    - name: Compile with J2ME libraries
      run: |
        cd src
        # Используй оригинальные файлы (не MOCK!)
        # javac -cp /tmp/j2me-libs/midpapi.zip:... *.java
        
        # Или просто компилируй что есть
        javac *.java || echo "Compilation warnings"
        
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class
    
    - name: Create JAD
      run: |
        cd src/dist
        JAR_SIZE=$(stat -f%z Pico8Emulator.jar 2>/dev/null || stat -c%s Pico8Emulator.jar)
        cat > Pico8Emulator.jad << JAD
MIDlet-1: Pico8Emulator, /icon.png, Pico8Emulator
MIDlet-Name: PICO-8 Emulator
MIDlet-Vendor: Pico8-J2ME
MIDlet-Version: 1.0
MicroEdition-Configuration: CLDC-1.0
MicroEdition-Profile: MIDP-2.0
MIDlet-Jar-Size: $JAR_SIZE
MIDlet-Jar-URL: Pico8Emulator.jar
JAD
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator-J2ME
        path: |
          src/dist/Pico8Emulator.jar
          src/dist/Pico8Emulator.jad
