name: Build PICO-8 J2ME

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Create J2ME stub libraries
      run: |
        mkdir -p /tmp/j2me-lib/javax/microedition/{midlet,lcdui}
        cd /tmp/j2me-lib
        
        # MIDlet stub
        echo 'package javax.microedition.midlet; public class MIDlet { public void startApp(){} public void pauseApp(){} public void destroyApp(boolean u){} }' > javax/microedition/midlet/MIDlet.java
        
        # Display stub
        echo 'package javax.microedition.lcdui; public class Display { public static Display getDisplay(javax.microedition.midlet.MIDlet m){return new Display();} public void setCurrent(Displayable d){} }' > javax/microedition/lcdui/Display.java
        
        # Canvas stub
        echo 'package javax.microedition.lcdui; public class Canvas extends Displayable { protected void paint(Graphics g){} protected void keyPressed(int k){} public int getWidth(){return 128;} public int getHeight(){return 128;} }' > javax/microedition/lcdui/Canvas.java
        
        # Graphics stub
        echo 'package javax.microedition.lcdui; public class Graphics { public static final int TOP=0; public static final int LEFT=0; public void setColor(int r,int g,int b){} public void fillRect(int x,int y,int w,int h){} public void drawString(String s,int x,int y,int a){} public void drawImage(Image i,int x,int y,int a){} }' > javax/microedition/lcdui/Graphics.java
        
        # Image stub
        echo 'package javax.microedition.lcdui; public class Image { public static Image createRGBImage(int[] rgb,int w,int h,boolean a){return new Image();} }' > javax/microedition/lcdui/Image.java
        
        # Displayable stub
        echo 'package javax.microedition.lcdui; public abstract class Displayable { }' > javax/microedition/lcdui/Displayable.java
        
        # Compile stubs
        javac javax/microedition/midlet/*.java javax/microedition/lcdui/*.java
        jar cf j2me-stubs.jar javax/
        echo "J2ME stubs created"
    
    - name: Compile PICO-8
      run: |
        cd src
        javac -cp /tmp/j2me-lib/j2me-stubs.jar -source 1.3 -target 1.3 *.java 2>&1
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class
        ls -lh dist/
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator
        path: src/dist/Pico8Emulator.jar
