name: Build PICO-8 J2ME with Real Libraries

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    
    - name: Download real J2ME libraries
      run: |
        mkdir -p /tmp/j2me-lib
        cd /tmp/j2me-lib
        
        # Пробуем загрузить из разных источников
        wget -q https://github.com/shinovon/midp-emulator/raw/master/midpapi.zip -O midpapi.zip 2>/dev/null || \
        wget -q https://github.com/netpipe/j2me-sdk/raw/master/midpapi.zip -O midpapi.zip 2>/dev/null || \
        wget -q https://github.com/eclipse/emf.core/raw/master/plugins/org.eclipse.emf.codegen.ecore/lib/midpapi.zip -O midpapi.zip 2>/dev/null || \
        echo "Could not download midpapi, using fallback"
        
        ls -la
    
    - name: Compile PICO-8
      run: |
        cd src
        
        # Пробуем с реальными библиотеками
        if [ -f /tmp/j2me-lib/midpapi.zip ]; then
          echo "Compiling with real J2ME libraries..."
          javac -cp /tmp/j2me-lib/midpapi.zip:/tmp/j2me-lib/cldcapi.zip -source 1.3 -target 1.3 *.java
        else
          echo "Compiling without external libraries..."
          javac -source 1.3 -target 1.3 *.java 2>&1 || true
        fi
        
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class
        ls -lh dist/Pico8Emulator.jar
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator
        path: src/dist/Pico8Emulator.jar
