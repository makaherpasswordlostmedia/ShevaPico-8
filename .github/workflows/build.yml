name: Build PICO-8 J2ME

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    
    - name: Compile Java files
      run: |
        cd src
        javac *.java
        mkdir -p dist
        jar cmf MANIFEST.MF dist/Pico8Emulator.jar *.class
    
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: Pico8Emulator
        path: src/dist/Pico8Emulator.jar
        retention-days: 30
